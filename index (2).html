<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arpoint - Registro de Ponto</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-alt: #888888;
            --accent: #2c2c2c;
            --btn-ponto: #ffffff;
            --btn-text: #000000;
            --mp-blue: #009ee3; /* Cor oficial Mercado Pago */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .logo-container img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--accent);
            margin-bottom: 15px;
        }

        h1 {
            font-weight: 700;
            letter-spacing: -1px;
            margin: 0;
            font-size: 1.8rem;
        }

        .status-bio {
            color: var(--text-alt);
            font-size: 0.8rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Botão Minimalista Superior Chamativo MP */
        .mini-support-btn {
            display: inline-block;
            background: transparent;
            border: 1px solid var(--mp-blue);
            color: var(--mp-blue);
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .mini-support-btn:hover {
            background: var(--mp-blue);
            color: white;
        }

        .camera-box {
            width: 100%;
            height: 200px;
            background: var(--card-bg);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--accent);
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: #fff;
            position: absolute;
            top: 0;
            animation: scan 3s infinite linear;
            opacity: 0.5;
            box-shadow: 0 0 15px #fff;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 14px;
            background: var(--card-bg);
            color: white;
            border: 1px solid var(--accent);
            border-radius: 14px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            outline: none;
        }

        .btn-action {
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--accent);
            background: var(--card-bg);
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 1px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-action:active {
            background: var(--text-main);
            color: var(--btn-text);
            transform: scale(0.97);
        }

        .history {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            text-align: left;
            font-size: 0.75rem;
            min-height: 80px;
            border: 1px solid var(--accent);
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }

        /* Botão Inferior Chamativo */
        .support-section {
            margin-top: auto;
            padding-top: 30px;
        }

        .btn-support-footer {
            width: 100%;
            background: var(--text-main);
            color: var(--btn-text);
            padding: 18px;
            border-radius: 18px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: transform 0.2s;
            border: none;
        }

        .btn-support-footer span {
            font-size: 0.65rem;
            color: var(--mp-blue);
            margin-top: 2px;
            font-weight: 900;
        }

        .btn-support-footer:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="logo-container">
        <img src="10387b4d-c7bd-415d-b0a9-e6193acfa396.png" alt="Arpoint Logo" onerror="this.src='https://via.placeholder.com/150/111/fff?text=AR'">
        <h1>Arpoint</h1>
        <p class="status-bio">Facilitando sua jornada</p>
        <a href="https://mpago.la/2jowptR" target="_blank" class="mini-support-btn">
            Apoie via Mercado Pago
        </a>
    </div>

    <select id="escala">
        <option value="Comercial">Horário Comercial (08:00 - 18:00)</option>
        <option value="12x36">Escala 12x36 (Plantão)</option>
    </select>

    <div class="camera-box">
        <div class="scan-line"></div>
        <p id="camera-status" style="color: #444; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px;">READY</p>
    </div>

    <div class="controls">
        <button class="btn-action" onclick="registrar('ENTRADA')">ENTRADA</button>
        <button class="btn-action" onclick="registrar('INTERVALO')">INTERVALO</button>
        <button class="btn-action" onclick="registrar('RETORNO')">RETORNO</button>
        <button class="btn-action" onclick="registrar('SAÍDA')">SAÍDA</button>
    </div>

    <div class="history" id="logs">
        <div style="color: #444; text-align: center; margin-top: 20px;">Sem registros hoje</div>
    </div>

    <div class="support-section">
        <a href="https://mpago.la/2jowptR" target="_blank" class="btn-support-footer">
            CONTRIBUIR COM O PROJETO
            <span>VIA MERCADO PAGO</span>
        </a>
    </div>
</div>

<script>
    function registrar(tipo) {
        const status = document.getElementById('camera-status');
        const logs = document.getElementById('logs');
        const escala = document.getElementById('escala').value;
        
        status.innerText = "AUTHENTICATING...";
        status.style.color = "#fff";

        setTimeout(() => {
            const agora = new Date();
            const tempo = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            if (logs.innerHTML.includes('Sem registros')) logs.innerHTML = '';

            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<span>${tipo}</span> <span style="color:var(--text-alt)">${tempo} - ${escala}</span>`;
            
            logs.prepend(div);
            status.innerText = "READY";
            status.style.color = "#444";
